---
version: '3'

tasks:
  validate:
    desc: Validate all DataRobot skills (naming, structure, frontmatter)
    cmds:
      - uv run bin/validate_skills.py

  ruff:check:
    desc: Run ruff linter on all Python scripts
    cmds:
      - uvx ruff check .

  ruff:format:
    desc: Run ruff formatter on all Python scripts
    cmds:
      - uvx ruff format .

  ruff:format:check:
    desc: Check if Python scripts are formatted correctly (CI mode)
    cmds:
      - uvx ruff format --check .

  shellcheck:
    desc: Run shellcheck on all shell scripts
    cmds:
      - shellcheck skills/datarobot-app-framework-cicd/scripts/*.sh

  yamlfmt:
    desc: Format all YAML files with yamlfmt
    cmds:
      - yamlfmt .

  yamlfmt:check:
    desc: Check if YAML files are formatted correctly (CI mode)
    cmds:
      - yamlfmt -lint .

  mypy:
    desc: Run mypy type checker on Python scripts (override dir with DIR=<path>)
    vars:
      DIR: '{{.DIR | default "skills/"}}'
    cmds:
      - uv run --group dev mypy {{.DIR}}

  lint:
    desc: Run all linting checks (validate skills + ruff + mypy + shellcheck + yamlfmt)
    deps:
      - validate
      - ruff:check
      - ruff:format:check
      - mypy
      - shellcheck
      - yamlfmt:check

  format:
    desc: Format all Python scripts and YAML files
    cmds:
      - task: ruff:format
      - task: yamlfmt

  test:e2e:
    desc: Run skill quality e2e tests (LLM judge, hash-cached)
    cmds:
      - uv run --group e2e pytest tests/e2e/ -v --tb=short

  test:e2e:force:
    desc: Re-evaluate every skill regardless of hash cache
    cmds:
      - SKILLS_E2E_FORCE_ALL=1 uv run --group e2e pytest tests/e2e/ -v --tb=short

  default:
    desc: Run validation and linting
    cmds:
      - task: lint
